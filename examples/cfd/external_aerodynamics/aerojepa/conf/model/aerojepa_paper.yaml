# Paper-scale AeroJEPA configuration.
#
# Matches the capacity reported in the AeroJEPA paper: `token_dim=256`,
# `max_point_tokens=1024`, six transformer/decoder/predictor layers, and
# 16384 sample points (set in `conf/data/superwing_paper.yaml`). This is
# multi-GPU / multi-node scale -- use `sub_paper.sub`. The smaller
# `aerojepa.yaml` remains the single-GPU tutorial baseline.

_target_: physicsnemo.experimental.models.aerojepa.AeroJEPA

trunk:
  _target_: physicsnemo.experimental.models.aerojepa.AeroJEPATrunk
  include_geometry_global_in_decoder_cond: false
  mask_prediction_enabled: false

  context_encoder:
    _target_: physicsnemo.experimental.models.aerojepa.ContextTransformer
    point_input_dim: 3
    token_dim: 256
    max_point_tokens: 1024
    tokenizer_strategy: fps_cluster
    tokenizer_cluster_size: 16
    tokenizer_knn_chunk_size: 128
    point_pos_pe_bands: 6
    num_heads: 8
    num_layers: 6
    neighbor_k: 16
    mlp_ratio: 4
    dropout: 0.0
    use_sdf: false
    use_solid_normals: false
    use_solid_n_dot_uinf: false

  target_encoder:
    _target_: physicsnemo.experimental.models.aerojepa.TargetTransformer
    # xyz (3) + per-point surface field (Cp, Cf_tau, Cf_z = 3 channels).
    point_input_dim: 6
    token_dim: 256
    max_point_tokens: 1024
    tokenizer_strategy: fps_cluster
    tokenizer_cluster_size: 16
    tokenizer_knn_chunk_size: 128
    point_pos_pe_bands: 6
    num_heads: 8
    num_layers: 6
    neighbor_k: 16
    mlp_ratio: 4
    dropout: 0.0

  decoder:
    _target_: physicsnemo.experimental.models.aerojepa.QueryTokenDecoder
    token_dim: 256
    hidden_dim: 256
    num_layers: 6
    out_dim: 3            # Cp, Cf_tau, Cf_z (SuperWing surface targets)
    use_sdf: false
    cond_dim: 2           # aoa, mach
    pe_num_bands: 16
    cross_attention_heads: 8
    cross_attention_layers: 4
    cross_attention_k: 8
    attention_mlp_ratio: 4
    dropout: 0.0
    query_chunk_size: 1024

predictor:
  _target_: physicsnemo.experimental.models.aerojepa.PrototypeTokenJEPAHead
  token_dim: 256
  cond_dim: 2
  hidden_dim: 256
  depth: 6
  num_heads: 8
  neighbor_k: 8
  query_pe_bands: 6
  mlp_ratio: 4
  dropout: 0.0
