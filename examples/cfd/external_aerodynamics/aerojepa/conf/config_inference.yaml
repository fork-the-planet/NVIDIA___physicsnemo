# Top-level config for `inference.py`. Reuses the recipe's `data` and
# `model` config groups; no `training` block is needed here.

defaults:
  - data: superwing
  - model: aerojepa
  - _self_

seed: 42
device: cuda

# Required: path to the checkpoint produced by `train.py`.
checkpoint: ???

# Output subdirectory under Hydra's run dir. Plots land in
# ``<output_dir>/plots/``, the predictions dump in
# ``<output_dir>/predictions.npz``.
output_dir: inference

# Autocast precision for the encoder + predictor. Decoder chunks run
# under the same precision and are accumulated on CPU.
precision: bf16

# Number of test cases to render to PNG. The full test split is always
# written to ``predictions.npz``.
num_plots: 4

# Chunk size for the chunked decoder (set lower if VRAM is tight).
decoder_chunk_size: 4096

# Multi-GPU inference needs no config: launch with
# `torchrun --nproc_per_node=<#GPUs> inference.py ...` and each rank runs a
# stride of the test split, gathering onto rank 0 for a single predictions.npz.

# Apply EMA weights from the checkpoint if present.
use_ema: true

logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
