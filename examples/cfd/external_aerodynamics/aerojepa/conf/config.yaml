defaults:
  - data: superwing
  - model: aerojepa
  - training: superwing
  - _self_

seed: 42
device: cuda

# Top-level run output directory. Hydra's `outputs/<date>/<time>/` layout
# is preserved; this is the relative subfolder under that for checkpoints,
# inference outputs and plots.
output_dir: outputs

# Logging configuration.
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
