# Path to the SuperWing dataset root produced by
# `python -m src.datapipes.download_superwing`. Must be set on the CLI:
#   python train.py data.path=/path/to/SuperWing_Dataset
path: ???

# Optional sidecar artifacts. ``null`` triggers auto-build into
# ``<path>/split_by_geometry.json`` and ``<path>/normalization_stats_train.json``
# on the first run.
split_manifest: null
normalization_stats_path: null

# Split ratios used when auto-building the manifest.
train_ratio: 0.8
val_ratio: 0.1
split_seed: 0

# Operating-condition columns inside ``index.npy``. SuperWing exposes
# ``(geom_id, group, aoa, mach, ...)``; we take aoa + mach.
gen_params_columns: [2, 3]
gen_params_names: [aoa, mach]

# Cap on training samples streamed for the normalization-stat builder.
normalization_max_target_samples: 4096

# Sample sizes (tutorial-friendly defaults; paper uses 16384).
surface_points: 4096
target_encoder_points: 4096
query_points: 4096

# Normalization.
normalize_xyz: true

# Sampling determinism.
train_deterministic_sampling: false
eval_deterministic_sampling: true

# Evaluation behaviour.
eval_full_grid_query: true
val_return_origingeom: true

# DataLoader knobs. With batch_size=1 the per-sample GPU work is small, so
# more workers + prefetch hides the memmap-read/subsample latency.
num_workers: 8
pin_memory: true
prefetch_factor: 4
