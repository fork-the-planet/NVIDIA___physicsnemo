# Training schedule for SuperWing (200-epoch run).
# Lower `epochs` (e.g. to a handful) for a quick smoke check.
epochs: 200
batch_size: 1
eval_batch_size: 1
max_eval_batches: 4
precision: bf16
save_every_epochs: 50

# Per-step progress logging cadence (batches). Emits a GeoTransolver-style
# line every `log_every` batches. `max_train_batches: null` uses the full
# epoch; set to a small int (e.g. 20) for a fast smoke run.
log_every: 50
max_train_batches: null

# torch.profiler diagnostics: set profile=true to profile the first
# `profile_steps` train batches and print the top ops (CPU vs CUDA self-time),
# then continue. Use to find the per-step bottleneck.
profile: false
profile_steps: 12

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-3
  weight_decay: 1.0e-3
  betas: [0.9, 0.95]

scheduler:
  name: warmup_cosine
  warmup_epochs: 2

grad_clip_norm: 10.0

# Exponential moving average of model parameters (paper uses EMA at the
# fork side; on by default for the tutorial since it stabilises eval).
ema:
  enabled: true
  decay: 0.999

# Loss configuration. The reconstruction term is the standard
# `relative_l2_mse` blend. The JEPA terms (latent + SIGReg) are warmed up
# linearly from 0 to their target weights over `*_warmup_epochs`.
loss:
  recon:
    kind: relative_l2_mse
    # relative_mse_mode only applies to the `relative_mse` kind; the active
    # `relative_l2_mse` blend ignores it.
    relative_mse_mode: pointwise
    eps: 1.0e-2
    relative_l2_weight: 1.0
    mse_weight: 0.2
    weight: 1.0
    warmup_epochs: 0

  latent:
    weight: 1.0
    mse_weight: 0.5
    cosine_weight: 0.5
    warmup_epochs: 5

  sigreg:
    weight: 1.0e-2
    warmup_epochs: 5
    knots: 17
    num_proj: 1024

  # Optional anti-collapse regularizer on the context latents (before the
  # predictor). Off by default (weight 0); the original AeroJEPA objective
  # regularizes only the target latents.
  sigreg_context:
    weight: 0.0
    warmup_epochs: 5
    knots: 17
    num_proj: 1024

# Optional two-phase training. Phase 1 trains the context + target encoders
# and the predictor in latent space (latent + SIGReg, decoder frozen). Phase 2
# freezes the encoders and predictor and trains only the decoder to
# reconstruct the field from the frozen latents. Disabled by default (a single
# phase with all loss terms active, all parameters trainable).
two_phase_training:
  enabled: false
  phase1_epochs: 100
  # Per-phase weight / train-flag overrides (defaults shown; unset keys fall
  # back to the `loss.*` weights above, or 0 where noted):
  #   phase1_train_context_encoder / phase1_train_target_encoder /
  #   phase1_train_predictor  (default true)
  #   phase1_recon_weight  (default 0.0)
  #   phase2_train_decoder  (default true)
  #   phase2_latent_weight / phase2_sigreg_weight / phase2_sigreg_context_weight
  #   (default 0.0); phase2_recon_weight (default loss.recon.weight)

# Resume an interrupted run: restore model + optimizer + LR scheduler + EMA and
# continue the schedule from the saved epoch. Off by default.
resume:
  enabled: false
  checkpoint_path: null
  strict: true
  load_optimizer: true
  load_scheduler: true

# Start a new run from pretrained weights: load the model weights only (fresh
# optimizer, epoch 0). With `strict: false` a checkpoint holding only a subset
# of modules (e.g. encoders + predictor) loads those and leaves the rest at
# initialization -- combine with `two_phase_training` phase 2 to train a
# decoder on top of frozen pretrained encoders + predictor. Off by default.
init_from_checkpoint:
  path: null
  strict: true
