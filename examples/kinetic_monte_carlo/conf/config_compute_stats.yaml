# Dataset. Reads the samples/ and maps/ subtrees from data_dir.
dataset:
  # Directory containing the samples/ and maps/ subtrees. Override at CLI.
  data_dir: ???
  # Names of the scalar particle features stored between the (x, y, z)
  # coordinates and the trailing delay column, in column order. Each name
  # becomes a key in the produced stats.json.
  particle_feature_names: [ionization_energy]
  # Names of the scalar mesh fields stored alongside positions in each maps
  # file. Each name becomes a key in the produced stats.json.
  mesh_feature_names: [temperature, voltage]
  # Cap on particles per snapshot. Must be >= the largest population in the
  # data (use the same value as for training). Required (no default).
  num_particles_max: ???

# Statistics-accumulation loop.
compute:
  # PyTorch DataLoader workers.
  num_workers: 4
  # Number of snapshots per batch while accumulating running statistics.
  batch_size: 4

# Output and logging.
io:
  # Destination JSON path. Leave null to write <data_dir>/stats.json.
  output_path: null
  # Log progress every N batches.
  logging_frequency: 100
